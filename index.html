<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>008A - Me Profile/Data from Coach</title>
  <style>
    :root{
      --bg:#0f1114;
      --panel:#171a1f;
      --panel-2:#20242b;
      --line:#313742;
      --text:#f4f7fb;
      --muted:#8b94a3;
      --blue:#57a6ff;
      --blue-soft:rgba(87,166,255,.18);
      --shadow:0 10px 24px rgba(0,0,0,.28);
      --safe-bottom:max(12px, env(safe-area-inset-bottom));
      --safe-top:max(10px, env(safe-area-inset-top));
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;overflow:hidden}
    body{display:flex;justify-content:center}
    .app{width:100%;max-width:460px;height:100dvh;display:grid;grid-template-rows:auto 1fr auto;background:var(--bg);margin:0 auto;align-items:stretch}

    .module-a-top{width:100%;max-width:460px;min-width:0;margin:0 auto;padding:calc(var(--safe-top) + 4px) 12px 8px;background:linear-gradient(180deg,#171a1f 0%, #111317 100%);border-bottom:1px solid var(--line)}
    .top-grid{display:grid;grid-template-columns:66px 1fr 66px;gap:10px;align-items:stretch}
    .top-btn,.top-card{border:1px solid var(--line);border-radius:16px;background:#1e2229;box-shadow:0 0 0 1px rgba(255,255,255,.03) inset;min-height:72px}
    .top-btn{display:flex;align-items:center;justify-content:center;padding:8px;text-align:center;font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#dcebff;background:radial-gradient(circle at 50% 35%, rgba(87,166,255,.22), transparent 48%), #1e2229;border:1px solid var(--line);cursor:pointer}
    .top-card{padding:10px 12px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:4px}
    .top-value{font-size:22px;line-height:1;font-weight:900;color:#eef6ff}
    .top-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:800}
    .top-sub{font-size:11px;color:#bfdcff;font-weight:800}

    .module-a-main{width:100%;max-width:460px;min-width:0;margin:0 auto;min-height:0;padding:14px 12px;display:flex;overflow:hidden}
    .main-card{width:100%;max-width:100%;min-width:0;min-height:0;border:1px solid var(--line);border-radius:22px;background:var(--panel);box-shadow:0 0 0 1px rgba(255,255,255,.03) inset, var(--shadow);overflow:hidden;display:flex;flex-direction:column}
    .page{flex:1 1 auto;min-width:0;min-height:0;display:none;flex-direction:column}
    .page.active{display:flex}

    .swipe-shell{flex:1 1 auto;min-width:0;max-width:100%;min-height:0;display:flex;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;scroll-behavior:smooth;scrollbar-width:none;-ms-overflow-style:none}
    .swipe-shell::-webkit-scrollbar{display:none}
    .swipe-panel{flex:0 0 100%;min-width:100%;max-width:100%;min-height:0;display:flex;align-items:stretch;justify-content:center;scroll-snap-align:start}
    .swipe-inner{width:100%;max-width:100%;min-width:0;display:flex;flex-direction:column;background:radial-gradient(circle at 50% 40%, rgba(87,166,255,.10), transparent 34%), linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0))}
    .home-split{flex:1 1 auto;min-height:0;display:grid;grid-template-columns:1fr 1fr}
    .home-half,.hero-panel{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:0;padding:18px}
    .home-half + .home-half{border-left:1px solid rgba(255,255,255,.07)}
    .hero-panel{background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01))}
    .home-big,.hero-big{font-size:min(27vw,120px);line-height:.9;font-weight:900;color:#eef6ff;text-shadow:0 0 18px rgba(87,166,255,.30), 0 0 42px rgba(87,166,255,.12);letter-spacing:-.03em}
    .home-title,.hero-title{margin-top:12px;font-size:13px;font-weight:900;letter-spacing:.10em;text-transform:uppercase;color:#dcebff;text-align:center}
    .home-note,.hero-note{position:absolute;left:18px;bottom:16px;font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
    .home-half.right .home-note{left:auto;right:18px;text-align:right}
    .hero-note.right{left:auto;right:18px;text-align:right}

    .section-stack,.page-body,.generic-wrap{min-width:0;max-width:100%;padding:12px;display:grid;gap:10px;overflow:auto;scrollbar-width:none}
    .section-stack::-webkit-scrollbar,.page-body::-webkit-scrollbar,.generic-wrap::-webkit-scrollbar{display:none}
    .status-head{display:flex;align-items:center;justify-content:space-between;gap:12px;min-width:0}
    .status-title{font-size:15px;font-weight:900;color:#eef6ff;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .status-mode{flex:0 0 auto;border:1px solid rgba(87,166,255,.38);background:var(--blue-soft);color:#dcebff;border-radius:999px;padding:6px 10px;font-size:10px;font-weight:900;letter-spacing:.06em;text-transform:uppercase}
    .grid-2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px;min-width:0}
    .panel{border:1px solid rgba(255,255,255,.06);border-radius:14px;background:rgba(255,255,255,.03);padding:10px 12px;min-width:0;max-width:100%}
    .panel.active-slot{border-color:rgba(87,166,255,.38);background:rgba(87,166,255,.10)}
    .panel-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:800}
    .panel-value{margin-top:6px;font-size:15px;font-weight:900;color:#eef6ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .note{font-size:12px;color:var(--muted);line-height:1.4}
    .view-head,.generic-box{background:#20242b;border:1px solid var(--line);border-radius:16px;padding:12px 14px}
    .view-title,.generic-title{font-size:22px;font-weight:900;line-height:1.05}
    .view-sub,.generic-sub{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.35}
    .action-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .slot-btn,.replace-btn{width:100%;min-height:42px;border-radius:12px;border:1px solid rgba(255,255,255,.08);font-size:13px;font-weight:800;cursor:pointer}
    .slot-btn{background:#1f232a;color:var(--text)}
    .slot-btn.is-active{border-color:#87c0ff;background:rgba(87,166,255,.14);color:#dcebff}
    .replace-btn{background:var(--blue);color:#07111b;border-color:#87c0ff}
    .cloud-select{width:100%;min-height:42px;border-radius:12px;border:1px solid rgba(255,255,255,.08);font-size:13px;font-weight:800;background:#1f232a;color:var(--text);padding:0 12px}

    .module-bottom{width:100%;max-width:460px;min-width:0;margin:0 auto;padding:10px 12px calc(12px + var(--safe-bottom));background:linear-gradient(0deg,#171a1f 0%, #111317 100%);border-top:1px solid var(--line)}
    .bottom-shell{width:100%;max-width:100%;min-width:0;border:1px solid var(--line);border-radius:18px;background:var(--panel);box-shadow:0 0 0 1px rgba(255,255,255,.03) inset;padding:10px 12px 8px;display:grid;gap:8px}
    .controls-row{display:grid;grid-template-columns:1fr 88px;gap:10px;align-items:center}
    .slider-row{display:grid;grid-template-columns:24px 1fr 24px;gap:8px;align-items:center}
    .edge{font-size:11px;font-weight:900;color:var(--muted);text-align:center;user-select:none}
    .slider-wrap{position:relative;height:34px;display:flex;align-items:center}
    #subSlider{-webkit-appearance:none;appearance:none;width:100%;height:8px;border-radius:999px;background:rgba(87,166,255,.22);outline:none}
    #subSlider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:58px;height:30px;background:transparent;border:none;margin-top:-11px}
    #subSlider::-moz-range-thumb{width:58px;height:30px;background:transparent;border:none}
    .slider-label{position:absolute;top:50%;left:0;transform:translate(-50%,-50%);min-width:58px;max-width:128px;height:30px;padding:0 12px;border-radius:999px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:11px;font-weight:900;color:#fff;border:2px solid #d8ebff;background:var(--blue);box-shadow:0 2px 6px rgba(0,0,0,.22);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:none}
    .wheel{width:82px;height:96px;overflow-y:auto;scrollbar-width:none;-ms-overflow-style:none;scroll-snap-type:y mandatory;scroll-behavior:smooth;overscroll-behavior:contain;padding:32px 0;display:flex;flex-direction:column;align-items:center;-webkit-mask-image:linear-gradient(to bottom, transparent 0%, black 25%, black 75%, transparent 100%);mask-image:linear-gradient(to bottom, transparent 0%, black 25%, black 75%, transparent 100%)}
    .wheel::-webkit-scrollbar{display:none}
    .wheel-item{width:100%;height:32px;min-height:32px;display:flex;align-items:center;justify-content:center;padding:0 6px;border:none;background:transparent;color:rgba(87,166,255,.62);font-size:11px;font-weight:800;scroll-snap-align:center;opacity:.62;transition:transform .16s ease, opacity .16s ease, color .16s ease;user-select:none;cursor:pointer;text-transform:uppercase}
    .wheel-item.active{color:#eef6ff;opacity:1;transform:scale(1.14);font-size:12px;font-weight:900}
    .bottom-note{text-align:center;font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-top:2px}
    .top-grid,.top-card,.top-sub,.status-head,.status-title,.panel-value,.controls-row,.slider-row,.slider-wrap{min-width:0;max-width:100%}

    .avatar-btn{padding:0;overflow:hidden;background:#111} 
    .avatar-btn img{width:100%;height:100%;object-fit:cover;display:block}
    .top-btn.save-mode{background:linear-gradient(180deg, rgba(87,166,255,.92), rgba(87,166,255,.78));color:#07111b;border-color:#87c0ff} 
    .me-view{display:none;min-width:0;max-width:100%;padding:12px;gap:10px;overflow:auto;scrollbar-width:none;-ms-overflow-style:none} 
    .me-view::-webkit-scrollbar{display:none} 
    .me-view.active{display:grid} 
    .profile-main-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px} 
    .profile-stat-card,.profile-metric-card,.profile-macro-card{border:1px solid rgba(255,255,255,.08);background:linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.035));border-radius:14px;padding:12px 10px;text-align:center;box-shadow:inset 0 1px 0 rgba(255,255,255,.04)} 
    .profile-stat-value{font-size:24px;font-weight:900;color:#eef6ff;line-height:1.1} 
    .profile-stat-label,.profile-metric-label,.profile-macro-label{margin-top:6px;font-size:11px;line-height:1.15;color:rgba(220,235,255,.74);font-weight:800;letter-spacing:.02em} 
    .profile-section-title{margin:10px 4px 8px;font-size:16px;font-weight:900;color:#eef6ff;letter-spacing:.02em;opacity:.96} 
    .profile-metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px} 
    .profile-macro-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px} 
    .profile-metric-value,.profile-macro-value{font-size:18px;font-weight:900;color:#eef6ff;line-height:1.05;margin-bottom:4px} 
    .profile-photo-wrap{display:grid;gap:10px} 
    .profile-photo-card{display:grid;grid-template-columns:96px 1fr;gap:12px;align-items:center;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:10px} 
    .profile-photo-preview{width:96px;height:96px;border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.08);background:#111;display:flex;align-items:center;justify-content:center} 
    .profile-photo-preview img{width:100%;height:100%;object-fit:cover;display:block} 
    .profile-photo-meta{display:grid;gap:8px} 
    .profile-photo-title{font-size:13px;font-weight:900;color:var(--text);letter-spacing:.04em;text-transform:uppercase} 
    .profile-photo-sub{font-size:12px;color:var(--muted);line-height:1.35} 
    .profile-photo-actions{display:flex;gap:8px;flex-wrap:wrap} 
    .profile-photo-btn,.im-btn{display:inline-flex;align-items:center;justify-content:center;background:#20242b;border:1px solid var(--line);color:var(--text);border-radius:12px;padding:10px 12px;font-size:13px;font-weight:800;cursor:pointer;min-height:42px} 
    .profile-photo-btn.danger{border-color:rgba(255,255,255,.06)} 
    .profile-photo-input{display:none} 
    .profile-form,.im-form{display:grid;gap:10px} 
    .profile-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:start} 
    .profile-field{display:grid;gap:6px;align-content:start} 
    .profile-label{min-height:14px;font-size:12px;color:var(--muted);font-weight:800;letter-spacing:.06em;text-transform:uppercase} 
    .profile-input,.custom-select-btn{width:100%;min-height:46px;height:46px;padding:0 12px;border-radius:12px;font-size:14px;font-weight:700;line-height:1.2;box-sizing:border-box;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);color:var(--text);outline:none} 
    .profile-input::placeholder{color:#6f7a8b} 
    .custom-select-wrap{position:relative} 
    .custom-select-native{display:none} 
    .custom-select-btn{display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer;text-align:left} 
    .custom-select-btn::after{content:'▾';color:var(--muted);font-size:12px;flex:0 0 auto} 
    .im-actions{display:flex;gap:10px;flex-wrap:wrap} 
    .im-status{font-size:12px;color:var(--muted)} 
    .custom-dd-overlay{position:fixed;inset:0;background:rgba(0,0,0,.42);display:none;z-index:120} 
    .custom-dd-overlay.open{display:block} 
    .custom-dd-sheet{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:min(92vw,420px);max-height:72vh;overflow:auto;background:#171a1f;border:1px solid var(--line);border-radius:16px;padding:10px;display:none;z-index:121;box-shadow:0 14px 40px rgba(0,0,0,.5)} 
    .custom-dd-sheet.open{display:block} 
    .custom-dd-title{font-size:16px;font-weight:900;margin:4px 4px 10px} 
    .custom-dd-list{display:grid;gap:8px} 
    .custom-dd-option{width:100%;text-align:left;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);color:var(--text);border-radius:12px;padding:12px 12px;font-size:14px;font-weight:700;cursor:pointer} 
    .custom-dd-option.active{outline:2px solid #57a6ff} 
    @media (max-width:430px){ .profile-macro-grid{grid-template-columns:1fr 1fr} .profile-grid-2{grid-template-columns:1fr 1fr} .profile-section-title{font-size:15px;margin:8px 2px 7px} .profile-photo-card{grid-template-columns:88px 1fr} .profile-photo-preview{width:88px;height:88px} }

  </style>
</head>
<body>
  <div class="app">
    <header class="module-a-top">
      <div class="top-grid">
        <div class="top-btn" id="coachButton"></div>
        <div class="top-card">
          <div class="top-value">77,4</div>
          <div class="top-label" id="weightLabel"></div>
          <div class="top-sub" id="topSubLabel"></div>
        </div>
        <button class="top-btn avatar-btn" id="meButton" type="button" aria-label="Me"><img id="topProfileAvatar" alt="Foto profilo" /></button>
      </div>
    </header>

    <main class="module-a-main">
      <section class="main-card">
        <div class="page active" id="swipePage">
          <div class="swipe-shell" id="swipeShell">
            <div class="swipe-panel">
              <div class="swipe-inner">
                <div class="hero-panel">
                  <div class="hero-big">A</div>
                  <div class="hero-title" id="trainingHeroTitle"></div>
                  <div class="hero-note" id="trainingHeroNote"></div>
                </div>
              </div>
            </div>
            <div class="swipe-panel">
              <div class="swipe-inner">
                <div class="home-split">
                  <div class="home-half left">
                    <div class="home-big">A</div>
                    <div class="home-title" id="homeLeftTitle"></div>
                    <div class="home-note" id="homeLeftNote"></div>
                  </div>
                  <div class="home-half right">
                    <div class="home-big">D</div>
                    <div class="home-title" id="homeRightTitle"></div>
                    <div class="home-note" id="homeRightNote"></div>
                  </div>
                </div>
              </div>
            </div>
            <div class="swipe-panel">
              <div class="swipe-inner">
                <div class="hero-panel">
                  <div class="hero-big">D</div>
                  <div class="hero-title" id="dietHeroTitle"></div>
                  <div class="hero-note right" id="dietHeroNote"></div>
                </div>
              </div>
            </div>
          </div>
          <div class="section-stack">
            <div class="status-head">
              <div class="status-title" id="homeStatusTitle"></div>
              <div class="status-mode" id="moduleBadge"></div>
            </div>
            <div class="grid-2">
              <div class="panel">
                <div class="panel-label" id="wheelLabelTitle"></div>
                <div class="panel-value" id="wheelValue"></div>
              </div>
              <div class="panel">
                <div class="panel-label" id="sliderLabelTitle"></div>
                <div class="panel-value" id="sliderValue"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="page" id="languagesPage">
          <div class="page-body">
            <div class="view-head">
              <div class="view-title" id="langPageTitle"></div>
              <div class="view-sub" id="langPageSub"></div>
            </div>
            <div class="grid-2">
              <div class="panel active-slot"><div class="panel-label" id="slotATitle"></div><div class="panel-value" id="slotAValue"></div></div>
              <div class="panel"><div class="panel-label" id="slotBTitle"></div><div class="panel-value" id="slotBValue"></div></div>
            </div>
            <div class="action-row">
              <button class="slot-btn" id="useSlotAButton" type="button"></button>
              <button class="slot-btn" id="useSlotBButton" type="button"></button>
            </div>
            <div class="panel"><div class="panel-label" id="replaceTargetLabel"></div><div class="panel-value" id="replaceTargetValue"></div></div>
            <div class="panel"><div class="panel-label" id="cloudSelectLabel"></div><select class="cloud-select" id="cloudPackSelect"></select></div>
            <button class="replace-btn" id="replaceBtn" type="button"></button>
            <div class="note" id="cloudStatus"></div>
          </div>
        </div>

        <div class="page" id="cloudPage">
          <div class="page-body">
            <div class="view-head"><div class="view-title" id="cloudPageTitle"></div><div class="view-sub" id="cloudPageSub"></div></div>
            <div class="grid-2">
              <div class="panel"><div class="panel-label" id="cloudBox1Label"></div><div class="panel-value" id="cloudBox1Value"></div></div>
              <div class="panel"><div class="panel-label" id="cloudBox2Label"></div><div class="panel-value" id="cloudBox2Value"></div></div>
            </div>
            <div class="grid-2">
              <div class="panel"><div class="panel-label" id="cloudBox3Label"></div><div class="panel-value" id="cloudBox3Value"></div></div>
              <div class="panel"><div class="panel-label" id="cloudBox4Label"></div><div class="panel-value" id="cloudBox4Value"></div></div>
            </div>
            <div class="note" id="cloudPageNote"></div>
          </div>
        </div>

        <div class="page" id="mePage">
          <div class="me-view" id="meProfileView"></div>
          <div class="me-view" id="meDataView"></div>
        </div>

        <div class="page" id="genericPage">
          <div class="generic-wrap">
            <div class="generic-box"><div class="generic-title" id="genericTitle"></div><div class="generic-sub" id="genericSub"></div></div>
          </div>
        </div>
      </section>
    </main>

    <footer class="module-bottom">
      <div class="bottom-shell">
        <div class="controls-row">
          <div class="slider-row">
            <div class="edge" id="sliderMin">1</div>
            <div class="slider-wrap">
              <input id="subSlider" type="range" min="1" max="8" step="1" value="1" />
              <div class="slider-label" id="sliderBubble"></div>
            </div>
            <div class="edge" id="sliderMax">8</div>
          </div>
          <div class="wheel" id="mainWheel" aria-label="Menu principale"></div>
        </div>
        <div class="bottom-note" id="bottomNote"></div>
      </div>
    </footer>
  </div>

  <div class="custom-dd-overlay" id="customDdOverlay"></div>
  <div class="custom-dd-sheet" id="customDdSheet">
    <div class="custom-dd-title" id="customDdTitle">Scegli</div>
    <div class="custom-dd-list" id="customDdList"></div>
  </div>

  <script>
    const packs = {
      it: { meta:{code:'it',name:'Italiano',version:'1.0.0'}, strings:{
        'nav.home':'Home','nav.coach':'Coach','nav.diet':'Dieta','nav.training':'Allen','nav.dataCenter':'Data G','nav.languages':'Lingue','nav.cloud':'Cloud','nav.me':'Me','nav.info':'Info',
        'top.currentWeight':'Peso attuale','home.leftTitle':'Allen','home.rightTitle':'Dieta','home.leftNote':'Lato sinistro','home.rightNote':'Lato destro','hero.trainingNote':'Pagina sinistra','hero.dietNote':'Pagina destra','layout.moduleA':'Modulo A',
        'status.wheel':'Rotellina','status.slider':'Slider','status.bottomNote':'Menu principale: {wheel} · sottosezione: {sub}',

    function buildWheel(){
      wheel.innerHTML = '';
      const total = navOrder.length;
      for(let copy=0; copy<loopCopies; copy+=1){
        navOrder.forEach((navKey, index) => {
          const button = document.createElement('button');
          const virtualIndex = copy * total + index;
          button.type = 'button';
          button.className = 'wheel-item';
          button.dataset.realIndex = String(index);
          button.dataset.virtualIndex = String(virtualIndex);
          button.addEventListener('click', () => setWheelIndex(index, true));
          wheel.appendChild(button);
        });
      }
      updateWheelLabels();
      requestAnimationFrame(() => setWheelIndex(0, true));
    }

    function updateWheelLabels(){ [...wheel.children].forEach(node => node.textContent = navLabel(navOrder[Number(node.dataset.realIndex)])); }
    function updateWheelActiveState(){ [...wheel.children].forEach(node => node.classList.toggle('active', Number(node.dataset.virtualIndex) === currentVirtualIndex)); }

    function normalizeWheelPosition(rawIndex){
      const total = navOrder.length;
      if(rawIndex < total * 0.5){ rawIndex += total; wheel.scrollTop += total * itemHeight; }
      if(rawIndex >= total * 2.5){ rawIndex -= total; wheel.scrollTop -= total * itemHeight; }
      return rawIndex;
    }

    function setWheelIndex(realIndex, centerScroll = false){
      const total = navOrder.length;
      activeWheelIndex = Math.max(0, Math.min(realIndex, total - 1));
      currentVirtualIndex = total + activeWheelIndex;
      updateWheelActiveState();
      updateSliderMeta();
      if(centerScroll){
        wheelLock = true;
        wheel.scrollTo({ top: currentVirtualIndex * itemHeight, behavior: 'smooth' });
        window.setTimeout(() => { wheelLock = false; }, 220);
      }
    }

    function syncWheelFromScroll(){
      if(wheelLock) return;
      let rawIndex = Math.round(wheel.scrollTop / itemHeight);
      rawIndex = normalizeWheelPosition(rawIndex);
      if(rawIndex !== currentVirtualIndex){
        currentVirtualIndex = rawIndex;
        activeWheelIndex = ((rawIndex % navOrder.length) + navOrder.length) % navOrder.length;
        updateWheelActiveState();
        updateSliderMeta();
      }
    }

    function computeProfile(){
      const d = profileState.data;
      const age = ageFromDate(d.birth);
      const h = parseDecimal(d.height);
      const hM = h ? h / 100 : null;
      const weightCurrent = parseDecimal(d.weightCurrent);
      const weightStart = parseDecimal(d.weightStart);
      const weightGoal = parseDecimal(d.weightGoal);
      const bodyFatInput = parseDecimal(d.bodyFat);
      const bmi = (weightCurrent && hM) ? weightCurrent / (hM*hM) : null;
      const estBodyFatPct = (bmi != null && age != null) ? (((1.2*bmi) + (0.23*age) - (10.8*sexNumeric(d.sex)) - 5.4) / 100) : null;
      let bodyFatPct = null;
      if(bodyFatInput != null && bodyFatInput > 0){ bodyFatPct = bodyFatInput > 1 ? bodyFatInput/100 : bodyFatInput; } else { bodyFatPct = estBodyFatPct; }
      const bodyFatKg = (bodyFatPct != null && weightCurrent != null) ? bodyFatPct * weightCurrent : null;
      const leanMass = (weightCurrent != null && bodyFatPct != null) ? weightCurrent * (1 - bodyFatPct) : null;
      let bmrKj = null;
      if(weightCurrent != null){
        if(bodyFatInput != null && bodyFatInput > 0){ const bf = bodyFatInput > 1 ? bodyFatInput/100 : bodyFatInput; bmrKj = 4.184 * (370 + 21.6 * (weightCurrent * (1 - bf))); }
        else if(h != null && age != null){ const sexAdj = d.sex === 'male' ? 5 : -161; bmrKj = 4.184 * (10*weightCurrent + 6.25*h - 5*age + sexAdj); }
      }
      const tdeeKj = bmrKj != null ? bmrKj * activityFactor(d.activity) : null;
      const targetKj = tdeeKj != null ? tdeeKj * (1 + strategyFactor(d.goalType, d.strategy)) : null;
      const trainingCode = d.training;
      const fatFactor = Math.max(0.6, 0.8 + (trainingCode === 'regular' ? 0.1 : 0));
      const energyFatBase = (weightCurrent != null) ? fatFactor * weightCurrent * 37 : null;
      const energyFatMin20 = targetKj != null ? targetKj * 0.2 : null;
      const fatEnergy = (energyFatBase != null && energyFatMin20 != null) ? Math.max(energyFatBase, energyFatMin20) : null;
      const fats = fatEnergy != null ? fatEnergy / 37 : null;
      const proteinFactor = Math.min(2.4, 1.6 + (d.goalType === 'deficit' ? 0.2 : 0) + ((age != null && age >= 50) ? 0.2 : 0) + (trainingCode === 'light' ? 0.2 : trainingCode === 'regular' ? 0.4 : 0));
      const proteins = leanMass != null ? proteinFactor * leanMass : null;
      const proteinEnergy = proteins != null ? proteins * 17 : null;
      const carbEnergy = (targetKj != null && proteinEnergy != null && fatEnergy != null) ? targetKj - proteinEnergy - fatEnergy : null;
      const carbs = carbEnergy != null ? carbEnergy / 17 : null;
      const deficit = (tdeeKj != null && targetKj != null) ? (tdeeKj - targetKj) : null;
      const fibre = targetKj != null ? (targetKj / 4200) * 14 : null;
      const kgWeek = deficit != null ? (deficit * 7 / 32000) : null;
      const timeWeeks = (weightCurrent != null && weightGoal != null && kgWeek != null && kgWeek > 0) ? ((weightCurrent - weightGoal) / kgWeek) : null;
      const weightToLose = (weightStart != null && weightGoal != null) ? (weightStart - weightGoal) : null;
      const toGoal = (weightCurrent != null && weightGoal != null) ? (weightCurrent - weightGoal) : null;
      const pathPct = (weightStart != null && weightCurrent != null && weightGoal != null && (weightStart - weightGoal) !== 0) ? ((weightStart - weightCurrent) / (weightStart - weightGoal)) : null;
      const lossPctWeek = (kgWeek != null && weightCurrent != null && weightCurrent > 0) ? (kgWeek / weightCurrent) : null;
      let carbMaxMeal = null;
      if(leanMass != null){
        const ageBase = age == null ? 0.3 : (age < 40 ? 0.25 : age < 55 ? 0.3 : age < 65 ? 0.35 : 0.4);
        const goalAdj = d.goalType === 'deficit' ? 0.05 : 0;
        const trainAdj = trainingCode === 'light' ? 0.03 : (trainingCode === 'regular' ? 0.07 : 0);
        const factor = Math.max(0.25, Math.min(0.45, ageBase + goalAdj + trainAdj));
        carbMaxMeal = Math.max(20, leanMass * factor);
      }
      return { age, bmi, bodyFatPct, bodyFatKg, leanMass, bmrKj, tdeeKj, targetKj, fats, proteins, carbs, fibre, deficit, kgWeek, timeWeeks, weightCurrent, weightToLose, toGoal, pathPct, lossPctWeek, fatMinMeal:0, fatMaxMeal:weightCurrent != null ? 0.4*weightCurrent : null, proteinMinMeal:55, proteinMaxMeal:weightCurrent != null ? 1.5*weightCurrent : null, carbMinMeal:35, carbMaxMeal };
    }

        customDdList.appendChild(btn);
      });
      customDdOverlay.classList.add('open');
      customDdSheet.classList.add('open');
    }
    function closeCustomDropdown(){
      if(customDdOverlay) customDdOverlay.classList.remove('open');
      if(customDdSheet) customDdSheet.classList.remove('open');
      currentCustomSelectId = null;
    }
    function updateStatus(text){ const s = document.getElementById('imStatus'); if(s) s.textContent = text; }
    function bindProfileUi(){
      const map = {
        profileSesso:'sex', profileBirthDate:'birth', profileAllenamento:'training', profileHeight:'height', bodyFatPercentField:'bodyFat', profileWeightStart:'weightStart', profileWeightCurrent:'weightCurrent', profileWeightGoal:'weightGoal', profileObiettivoPrincipale:'goalType', profileAttivita:'activity', profileStrategie:'strategy'
      };
      Object.entries(map).forEach(([id,key]) => {
        const el = document.getElementById(id);
        if(!el) return;
        if(el.tagName === 'SELECT') applySelectLabel(id);
        const handler = () => {
          profileState.data[key] = el.value;
          if(el.tagName === 'SELECT') applySelectLabel(id);
          profileDirty = true;
          updateStatus(tp('unsaved'));
          updateCoachButtonState();
        };
        el.addEventListener('input', handler);
        el.addEventListener('change', handler);
      });
      document.querySelectorAll('[data-custom-select]').forEach(btn => {
        btn.addEventListener('click', () => openCustomDropdown(btn.getAttribute('data-custom-select'), btn.getAttribute('data-custom-label') || tp('choose')));
      });
      const photoInput = document.getElementById('profilePhotoInput');
      if(photoInput){
        photoInput.addEventListener('change', e => {
          const file = e.target.files && e.target.files[0];
          if(!file) return;
          const reader = new FileReader();
          reader.onload = () => {
            profileState.photo = String(reader.result || '');
            profileDirty = true;
            const preview = document.getElementById('profilePhotoPreview'); if(preview) preview.src = activePhoto();
            updateTopAvatar();
            updateStatus(tp('unsaved'));
            updateCoachButtonState();
          };
          reader.readAsDataURL(file);
        });
      }
      const removeBtn = document.getElementById('removeProfilePhotoBtn');
      if(removeBtn){ removeBtn.addEventListener('click', () => { profileState.photo = ''; profileDirty = true; const preview = document.getElementById('profilePhotoPreview'); if(preview) preview.src = activePhoto(); updateTopAvatar(); updateStatus(tp('unsaved')); updateCoachButtonState(); }); }
      const resetBtn = document.getElementById('imResetBtn');
      if(resetBtn){ resetBtn.addEventListener('click', () => { profileState.data = { sex:'male', birth:'', training:'none', height:'', bodyFat:'', weightStart:'', weightCurrent:'', weightGoal:'', goalType:'deficit', activity:'sedentary', strategy:'conservative' }; profileState.photo=''; profileDirty = true; renderMeViews(); updateStatus(tp('resetDone')); updateCoachButtonState(); }); }
    }

    slider.addEventListener('input', updateSliderUI);
    wheel.addEventListener('scroll', () => requestAnimationFrame(syncWheelFromScroll));
    swipeShell.addEventListener('scroll', () => {
      if(swipeTimer) clearTimeout(swipeTimer);
      swipeTimer = setTimeout(syncNavFromSwipe, 90);
    });
    useSlotAButton.addEventListener('click', () => setActiveSlot('slotA'));
    useSlotBButton.addEventListener('click', () => setActiveSlot('slotB'));
    replaceBtn.addEventListener('click', replaceInactiveSlot);
    coachButton.addEventListener('click', () => { if(currentNavKey() === 'me'){ saveProfileChanges(); } else { goToNav('coach'); } });
    meButton.addEventListener('click', () => goToNav('me'));
    if(customDdOverlay) customDdOverlay.addEventListener('click', closeCustomDropdown);

    loadProfileState();
    profileDirty = false;
    updateStaticTexts();
    buildWheel();
  </script>
</body>
</html>
